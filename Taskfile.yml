version: '3'

vars:
  VENV_DIR: .venv

tasks:
  install:
    desc: Crea entorno virtual e instala dependencias
    cmds:
      - python -m venv {{.VENV_DIR}}
      - .venv/Scripts/pip install -r requirements.txt

  run:
    desc: Ejecuta el pipeline principal (usa datos de ejemplo)
    dir: "{{.ROOT}}"
    cmds:
      - .venv/Scripts/python -m src.services.main_runner --sample

  run-full:
    desc: Ejecuta el pipeline principal (descarga datos reales)
    dir: "{{.ROOT}}"
    cmds:
      - .venv/Scripts/python -m src.services.main_runner

  api:
    desc: Inicia el servidor API REST
    dir: "{{.ROOT}}"
    cmds:
      - .venv/Scripts/python -m src.api.gateway

  test:
    desc: Ejecuta las pruebas unitarias
    dir: "{{.ROOT}}"
    cmds:
      - .venv/Scripts/pytest -v

  clean:
    desc: Limpia archivos generados y caches
    cmds:
      - rm -rf __pycache__ src/__pycache__ src/**/*.pyc
      - rm -rf .pytest_cache
      - rm -rf .ruff_cache
      - rm -rf {{.VENV_DIR}}
      - rm -f data/processed/*.png data/processed/*.csv

  clean-data:
    desc: Limpia solo datos procesados
    cmds:
      - rm -f data/processed/*.png data/processed/*.csv

  build:
    desc: Construye imágenes Docker
    cmds:
      - docker-compose build

  up:
    desc: Inicia todos los servicios con Docker
    cmds:
      - docker-compose up

  down:
    desc: Detiene todos los servicios Docker
    cmds:
      - docker-compose down

  lint:
    desc: Ejecuta linter de código
    dir: "{{.ROOT}}"
    cmds:
      - .venv/Scripts/python -m ruff check src/

  help:
    desc: Muestra esta ayuda
    cmds:
      - task --list
